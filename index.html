<!DOCTYPE html>
<html>
<head>
    <title>Vishnu</title>
    <style>
        body{
            margin:0;
            text-align:center;
            color:white;
            font-family:Arial;
            overflow:hidden;
        }

        video{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            object-fit:cover;
            z-index:-1;
        }

        .box{
            width:330px;
            margin:60px auto;
            background:rgba(0,0,0,0.5);
            padding:20px;
            border-radius:20px;
        }

        img{
            width:100%;
            height:380px;
            object-fit:cover;
            border-radius:15px;
        }

        button{
            padding:10px 20px;
            margin:10px;
            font-size:20px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        .dots{
            font-size:22px;
        }
    </style>
</head>
<body>

    <video autoplay muted loop>
        <source src="bg.mp4" type="video/mp4">
    </video>

    <div class="box">
        <img id="photo" src="PHOTO1.jpeg">
        <h1>Vishnu</h1>

        <button onclick="prev()">⬅</button>
        <button onclick="next()">➡</button>

        <div class="dots" id="dots"></div>
    </div>

    <script>
        let photos = [
            "PHOTO.jpeg",
            "PHOTO2.jpeg",
            "PHOTO3.jpeg",
            "PHOTO4.jpeg",
            "PHOTO5.jpeg",
            "PHOTO6.jpeg",
            "PHOTO7.jpeg"
        ];

        let i = 0;

        function showPhoto(){
            document.getElementById("photo").src = photos[i];

            let d = "";
            for(let j=0; j<photos.length; j++){
                d += (j==i) ? "● " : "○ ";
            }
            document.getElementById("dots").innerHTML = d;
        }

        function next(){
            i = (i+1) % photos.length;
            showPhoto();
        }

        function prev(){
            i = (i-1+photos.length) % photos.length;
            showPhoto();
        }

        showPhoto();
    </script>

</body>
</html>
